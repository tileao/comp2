<!doctype html><html lang='pt-BR'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'><meta name='theme-color' content='#111b26'><link rel='manifest' href='../manifest.webmanifest'><title>AW139 Companion — Pouso Offshore</title><link rel='icon' type='image/png' sizes='32x32' href='../assets/icon-32.png'><link rel='apple-touch-icon' sizes='180x180' href='../assets/icon-180.png'><link rel='stylesheet' href='styles.css'><link rel='stylesheet' href='../shared/pwa.css'><link rel='stylesheet' href='../shared/module-layout.css'></head><body><main class='cockpit-shell'><header class='topbar slim-topbar'><div class='topbar-left'><a class='nav-btn' href='../index.html'>⥢</a><div class='product-tag no-sep'><div class='product-icon'><img src='../assets/icon-192.png' alt=''></div><div><div class='product-line'>AW139 Companion</div><div class='product-sub'>Pouso Offshore</div></div></div></div></header><section class='workspace'><aside class='sidebar'><section class='panel entry-panel'><div class='panel-title-row'><div><div class='panel-kicker'>Fluxo composto</div><h1>Pouso Offshore</h1></div></div><form onsubmit='return false'><div class='section-label'>Operação</div><div class='form-grid form-grid-2'><label class='field'><span>Aeronave</span><select id='aircraft'><option value='6800'>6800 kg</option><option value='7000' selected>7000 kg / Sup 90</option></select></label><label class='field'><span>Configuration</span><select id='config'><option value='standard'>Clean Air Intake</option><option value='eaps_off'>EAPS OFF</option><option value='eaps_on'>EAPS ON</option><option value='ibf'>IBF Installed</option></select></label></div><div class='form-grid form-grid-2'><label class='field'><span>Perfil de pouso</span><select id='profile'><option value='descending'>Descending profile</option><option value='level'>Level profile</option></select></label><label class='field'><span>Weight (kg)</span><input id='weight' type='number' inputmode='numeric' enterkeyhint='next' placeholder='6500'></label></div><div class='section-label'>Condições</div><div class='form-grid form-grid-2'><label class='field'><span>QNH (hPa)</span><input id='qnh' type='number' inputmode='numeric' enterkeyhint='next' placeholder='1013'></label><label class='field'><span>Elevação (ft)</span><input id='elevation' type='number' inputmode='numeric' enterkeyhint='next' placeholder='0'></label></div><div class='form-grid form-grid-2'><label class='field'><span>OAT (°C)</span><input id='oat' type='number' inputmode='numeric' enterkeyhint='next' placeholder='25'></label><label class='field'><span>Headwind (kt)</span><input id='wind' type='number' inputmode='numeric' enterkeyhint='done' placeholder='10'></label></div><div class='action-row'><button id='runBtn' class='run-btn' type='button'>Calcular Pouso Offshore</button><button id='pdfBtn' class='ghost-btn secondary-action' type='button'>Compartilhar PDF</button><button id='resetBtn' class='ghost-btn secondary-action' type='button'>Reset</button></div></form></section><section id='resultCard' class='panel result-panel pending'><div class='panel-title-row compact'><div><div class='panel-kicker'>Resultado</div><h2>Decision Summary</h2></div><span id='statusChip' class='status-chip warn'>Aguardando cálculo</span></div><div class='result-grid'><div class='result-box' id='watBox'><div class='result-label'>WAT Max Weight</div><div class='result-value' id='maxWeight'>—</div><div class='result-sub' id='watSummary'>Sem cálculo ainda.</div></div><div class='result-box' id='ddBox'><div class='result-label'>Dropdown</div><div class='result-value' id='dropdownRes'>—</div><div class='result-sub' id='ddSummary'>Sem cálculo ainda.</div></div></div><div class='result-band' id='margin'>—</div></section></aside><section class='viewer-pane'><div class='viewer-header'><div><div class='panel-kicker'>Visualização</div><div class='viewer-title' id='vizTitle'>WAT Offshore Procedure</div></div><di
