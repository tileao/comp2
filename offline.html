<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>AW139 Companion — Offline</title>
  <style>
    :root{--bg:#0b1220;--panel:#162334;--text:#e5eef7;--muted:#a9b8c8;--accent:#2fa7a0}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,var(--bg),#111827);color:var(--text);display:grid;place-items:center;padding:24px}
    .card{max-width:540px;width:100%;border:1px solid rgba(255,255,255,.1);border-radius:24px;background:rgba(22,35,52,.95);padding:24px;box-shadow:0 22px 48px rgba(0,0,0,.28)}
    h1{margin:0 0 10px;font-size:32px;line-height:1.05}p{margin:0 0 12px;color:var(--muted);line-height:1.55}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:14px;background:linear-gradient(180deg,var(--accent),#248d87);color:#08131a;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <h1>Modo offline</h1>
    <p>O shell do app está disponível offline. Se algum módulo específico ainda não abrir, conecte-se uma vez para que os arquivos dele sejam armazenados no aparelho.</p>
    <p>Para uso mais confiável, abra pelo menos uma vez o Fluxo CAT A, WAT, RTO e ADC enquanto estiver online.</p>
    <a class="btn" href="./index.html">Voltar para a home</a>
  </main>
</body>
</html>
